services:
  - type: web
    name: finanza-personale
    runtime: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      # Neon Postgres connection string. Create a free project at
      # https://neon.tech, then paste the connection URL here in the
      # Render dashboard. Marked sync: false so it is set via the UI
      # and not committed to git.
      - key: DATABASE_URL
        sync: false
