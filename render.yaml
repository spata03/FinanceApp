services:
  - type: web
    name: finanza-personale
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 10000
    disk:
      name: finanza-data
      mountPath: /app/backend/data
      sizeGB: 1
