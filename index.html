<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gestione finanziaria personale – tieni traccia di entrate, spese e risparmi in modo semplice." />
    <meta name="theme-color" content="#0f1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="FinanzaPersonale" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>FinanzaPersonale</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icons/app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icons/app-icon.svg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Global styles -->
    <link rel="stylesheet" href="src/styles/reset.css" />
    <link rel="stylesheet" href="src/styles/variables.css" />
    <link rel="stylesheet" href="src/styles/main.css" />
    <link rel="stylesheet" href="src/styles/components.css" />
  </head>
  <body>
    <!-- App root -->
    <div id="app">

      <!-- ── Sidebar navigation ── -->
      <nav id="sidebar" class="sidebar" role="navigation" aria-label="Menu principale">
        <div class="sidebar__logo">
          <span class="logo-icon">💰</span>
          <span class="logo-text">FinanzaPersonale</span>
        </div>

        <ul class="sidebar__nav" role="menubar">
          <li role="none">
            <button id="nav-dashboard" class="nav-btn active" role="menuitem" data-page="dashboard" aria-current="page">
              <span class="nav-icon">📊</span>
              <span class="nav-label">Dashboard</span>
            </button>
          </li>
          <li role="none">
            <button id="nav-entrate" class="nav-btn" role="menuitem" data-page="entrate">
              <span class="nav-icon">📈</span>
              <span class="nav-label">Entrate</span>
            </button>
          </li>
          <li role="none">
            <button id="nav-spese" class="nav-btn" role="menuitem" data-page="spese">
              <span class="nav-icon">📉</span>
              <span class="nav-label">Spese</span>
            </button>
          </li>
          <li role="none">
            <button id="nav-mensile" class="nav-btn" role="menuitem" data-page="mensile">
              <span class="nav-icon">📅</span>
              <span class="nav-label">Mensile</span>
            </button>
          </li>
          <li role="none">
            <button id="nav-risparmi" class="nav-btn" role="menuitem" data-page="risparmi">
              <span class="nav-icon">🏦</span>
              <span class="nav-label">Risparmi</span>
            </button>
          </li>
          <li role="none">
            <button id="nav-salvadanaio" class="nav-btn" role="menuitem" data-page="salvadanaio">
              <span class="nav-icon">🐷</span>
              <span class="nav-label">Salvadanaio</span>
            </button>
          </li>
          <li role="none">
            <button id="nav-report" class="nav-btn" role="menuitem" data-page="report">
              <span class="nav-icon">📋</span>
              <span class="nav-label">Report</span>
            </button>
          </li>
          <li role="none">
            <button id="nav-assistente" class="nav-btn" role="menuitem" data-page="assistente">
              <span class="nav-icon">💬</span>
              <span class="nav-label">Assistente</span>
            </button>
          </li>
          <li role="none">
            <button id="nav-impostazioni" class="nav-btn" role="menuitem" data-page="impostazioni">
              <span class="nav-icon">⚙️</span>
              <span class="nav-label">Impostazioni</span>
            </button>
          </li>
        </ul>

        <div id="sync-status-sidebar" style="margin-top:auto; padding: 0.5rem 1rem; font-size: 0.75rem; color: var(--clr-text-subtle); display:flex; flex-direction:column; gap:0.25rem; cursor:pointer;" title="Clicca per sincronizzare ora">
          <div style="display:flex; align-items:center; gap:0.5rem;">
            <span id="sync-icon">🔄</span>
            <span id="sync-text">Sincronizzato</span>
          </div>
          <div id="sync-time" style="font-size:0.65rem; padding-left:1.5rem; opacity:0.8;">Mai sincronizzato</div>
        </div>
        <div class="sidebar__footer">
          <span id="current-month" class="sidebar-month"></span>
        </div>
      </nav>

      <!-- ── Main content area ── -->
      <main id="main-content" class="main-content" role="main">
        <div id="page-container"></div>
      </main>

    </div><!-- /#app -->

    <!-- Components loaded via JS -->
    <script type="module" src="src/app.js"></script>
  </body>
</html>
